<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JimnyCamp{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="bg-surface font-inter min-h-screen">
  {% block body %}{% endblock %}
  <footer class="text-center py-4 mt-6">
    <p class="text-xs text-gray-400">Proudly powered by <a href="https://ufo.com" target="_blank" rel="noopener noreferrer" class="hover:text-gray-600 transition-colors underline underline-offset-2">ufo.com</a> &middot; <a href="https://github.com/laoman" target="_blank" rel="noopener noreferrer" class="hover:text-gray-600 transition-colors">@laoman</a></p>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
